[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 1000000
via_ir = true

remappings = [
    "@uniswap/v4-core/=lib/v4-core/src/",
    "@uniswap/v4-periphery/=lib/v4-periphery/src/",
    "forge-std/=lib/forge-std/src/",
    "reactive-lib/=lib/reactive-lib/src/",
]

[profile.default.fuzz]
runs = 1000
